<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الزبائن | دفتر الزبائن</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
body{background:#0f172a;color:#fff;display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#1e293b;
    padding:30px 20px;
}
.logo{text-align:center;margin-bottom:40px}
.sidebar a{
    display:block;
    padding:12px;
    margin-bottom:10px;
    color:#cbd5e1;
    text-decoration:none;
    border-radius:8px;
    transition:.3s;
}
.sidebar a:hover,
.sidebar .active{
    background:#3b82f6;
    color:#fff;
}

/* MAIN */
.main{flex:1;padding:30px}

.form-box{
    background:rgba(255,255,255,.05);
    padding:20px;
    border-radius:15px;
    margin-bottom:30px;
}

input{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:6px;
    width:200px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn-primary{background:#3b82f6;color:#fff}
.btn-danger{background:#ef4444;color:#fff}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}
th,td{padding:12px;text-align:center}
th{background:#334155}
tr:nth-child(even){background:#1a2335}
</style>
</head>
<body>

<div class="sidebar">
    <h2 class="logo">دفتر الزبائن</h2>
    <a href="index.html">لوحة التحكم</a>
    <a href="customers.html" class="active">الزبائن</a>
    <a href="invoices.html">الفواتير</a>
    <a href="logs.html">سجل الحركات</a>
</div>

<div class="main">
    <h1>إدارة الزبائن</h1>

    <div class="form-box">
        <input type="text" id="customerName" placeholder="اسم الزبون">
        <input type="text" id="customerPhone" placeholder="رقم الهاتف">
        <button class="btn-primary" onclick="addCustomer()">إضافة زبون</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الهاتف</th>
                <th>حذف</th>
            </tr>
        </thead>
        <tbody id="customersTable">
            <tr><td colspan="3">لا توجد بيانات</td></tr>
        </tbody>
    </table>
</div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain: "garag-system.firebaseapp.com",
  databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
  projectId: "garag-system"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// إنشاء storeId
const storeId = "main_store_001"; // ثابت لكل الصفحات

// 🔹 نظام سجل الحركات
function addLog(action, description){
    const logRef = ref(db, `stores/${storeId}/logs/${Date.now()}`);
    const now = new Date();
    set(logRef,{
        action,
        description,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString(),
        timestamp: Date.now()
    });
}

// 🔹 إضافة زبون
window.addCustomer = function(){
    const name = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("customerPhone").value.trim();

    if(!name) return alert("اكتب اسم الزبون");

    const id = Date.now();

    set(ref(db, `stores/${storeId}/customers/${id}`),{
        name,
        phone,
        createdAt: Date.now()
    });

    addLog("إضافة زبون","تم إضافة الزبون: "+name);

    document.getElementById("customerName").value="";
    document.getElementById("customerPhone").value="";
};

// 🔹 حذف زبون
window.deleteCustomer = function(id,name){
    if(confirm("هل تريد حذف الزبون؟")){
        remove(ref(db, `stores/${storeId}/customers/${id}`));
        addLog("حذف زبون","تم حذف الزبون: "+name);
    }
};

// 🔹 عرض الزبائن مباشرة
onValue(ref(db, `stores/${storeId}/customers`), snapshot=>{
    const data = snapshot.val();
    const table = document.getElementById("customersTable");
    table.innerHTML="";

    if(!data){
        table.innerHTML="<tr><td colspan='3'>لا توجد بيانات</td></tr>";
        return;
    }

    Object.entries(data).forEach(([id,customer])=>{
        table.innerHTML += `
        <tr>
            <td>${customer.name}</td>
            <td>${customer.phone || "-"}</td>
            <td>
                <button class="btn-danger" onclick="deleteCustomer('${id}','${customer.name}')">
                حذف
                </button>
            </td>
        </tr>`;
    });
});

</script>

</body>

</html>

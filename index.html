<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | دفتر الزبائن</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
body{background:#0f172a;color:#fff;display:flex;min-height:100vh}
.sidebar{width:240px;background:#1e293b;padding:30px 20px}
.logo{text-align:center;margin-bottom:40px}
.sidebar a{display:block;padding:12px;margin-bottom:10px;color:#cbd5e1;text-decoration:none;border-radius:8px;transition:.3s;}
.sidebar a:hover,.sidebar .active{background:#3b82f6;color:#fff}
.main{flex:1;padding:30px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:30px}
.card{background:rgba(255,255,255,.05);padding:20px;border-radius:15px;transition:.3s}
.card:hover{transform:translateY(-5px)}
.card h3{font-size:14px;color:#94a3b8;margin-bottom:10px}
.card p{font-size:22px;font-weight:bold}
table{width:100%;margin-top:30px;border-collapse:collapse;background:#1e293b;}
th,td{padding:12px;text-align:center}
th{background:#334155}
tr:nth-child(even){background:#1a2335}
.charts{display:flex;flex-wrap:wrap;gap:20px;margin-top:30px}
canvas{background:rgba(255,255,255,.05);border-radius:15px;padding:15px}
</style>
</head>
<body>

<div class="sidebar">
    <h2 class="logo">دفتر الزبائن</h2>
    <a href="index.html" class="active">لوحة التحكم</a>
    <a href="customers.html">الزبائن</a>
    <a href="invoices.html">الفواتير</a>
    <a href="logs.html">سجل الحركات</a>
</div>

<div class="main">
    <h1>لوحة التحكم</h1>

    <!-- إحصائيات سريعة -->
    <div class="stats">
        <div class="card">
            <h3>إجمالي الديون</h3>
            <p id="totalDebt">0</p>
        </div>
        <div class="card">
            <h3>عدد الزبائن</h3>
            <p id="totalCustomers">0</p>
        </div>
        <div class="card">
            <h3>عدد الفواتير المفتوحة</h3>
            <p id="openInvoices">0</p>
        </div>
    </div>

    <!-- إحصائيات متقدمة -->
    <h2>الإحصائيات المتقدمة</h2>
    <div class="charts">
        <canvas id="pieChart" width="300" height="300"></canvas>
        <canvas id="barChart" width="400" height="300"></canvas>
    </div>

    <h2>آخر الحركات</h2>
    <table>
        <thead>
            <tr>
                <th>العملية</th>
                <th>الوصف</th>
                <th>التاريخ</th>
                <th>الوقت</th>
            </tr>
        </thead>
        <tbody id="recentLogs">
            <tr><td colspan="4">لا توجد بيانات</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain: "garag-system.firebaseapp.com",
  databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
  projectId: "garag-system"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

if(!localStorage.getItem("storeId")){
    localStorage.setItem("storeId", crypto.randomUUID());
}
const storeId = localStorage.getItem("storeId");

let allInvoices = [];
let allCustomers = [];
let allLogs = [];

// 🔹 إحصائيات سريعة
onValue(ref(db, `stores/${storeId}`), snapshot=>{
    const data = snapshot.val();
    if(!data) return;

    let totalDebt = 0;
    let openInvoices = 0;
    let totalCustomers = 0;

    if(data.customers){
        totalCustomers = Object.keys(data.customers).length;
        allCustomers = Object.values(data.customers);
    }

    if(data.invoices){
        allInvoices = Object.values(data.invoices);
        allInvoices.forEach(inv=>{
            totalDebt += Number(inv.remaining || 0);
            openInvoices++;
        });
    }

    document.getElementById("totalDebt").innerText = totalDebt + " د.ع";
    document.getElementById("totalCustomers").innerText = totalCustomers;
    document.getElementById("openInvoices").innerText = openInvoices;

    drawPieChart();
    drawBarChart();
});

// 🔹 آخر الحركات
onValue(ref(db, `stores/${storeId}/logs`), snapshot=>{
    const logs = snapshot.val();
    const table = document.getElementById("recentLogs");
    table.innerHTML="";
    if(!logs){
        table.innerHTML="<tr><td colspan='4'>لا توجد بيانات</td></tr>";
        return;
    }
    const sorted = Object.values(logs).reverse().slice(0,5);
    allLogs = Object.values(logs).sort((a,b)=>b.timestamp-a.timestamp);

    sorted.forEach(log=>{
        table.innerHTML += `
        <tr>
            <td>${log.action}</td>
            <td>${log.description}</td>
            <td>${log.date}</td>
            <td>${log.time}</td>
        </tr>`;
    });
});

// 🔹 رسم PieChart للمدفوع والمتبقي
function drawPieChart(){
    const canvas = document.getElementById("pieChart");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let paid = 0;
    let remaining = 0;

    allInvoices.forEach(inv=>{
        paid += Number(inv.paid || 0);
        remaining += Number(inv.remaining || 0);
    });

    const total = paid + remaining;
    const paidAngle = (paid/total)*2*Math.PI;
    const remainingAngle = (remaining/total)*2*Math.PI;

    // دائرة المدفوع
    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.fillStyle="#22c55e";
    ctx.arc(150,150,100,0,paidAngle);
    ctx.fill();

    // دائرة المتبقي
    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.fillStyle="#ef4444";
    ctx.arc(150,150,100,paidAngle,paidAngle+remainingAngle);
    ctx.fill();

    // كتابة النسب
    ctx.fillStyle="#fff";
    ctx.font="16px Arial";
    ctx.fillText("المدفوع: "+paid+" د.ع", 80, 270);
    ctx.fillText("المتبقي: "+remaining+" د.ع", 220, 270);
}

// 🔹 رسم BarChart لأكبر 5 زبائن دينًا
function drawBarChart(){
    const canvas = document.getElementById("barChart");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(allCustomers.length===0) return;

    // حساب ديون كل زبون
    let debts = {};
    allInvoices.forEach(inv=>{
        if(!debts[inv.customer]) debts[inv.customer]=0;
        debts[inv.customer] += Number(inv.remaining || 0);
    });

    let top5 = Object.entries(debts)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5);

    const barWidth = 50;
    const maxDebt = Math.max(...top5.map(x=>x[1])) || 1;

    top5.forEach((entry,index)=>{
        const x = 50 + index*70;
        const y = 250 - (entry[1]/maxDebt*200);
        const height = entry[1]/maxDebt*200;

        ctx.fillStyle="#3b82f6";
        ctx.fillRect(x,y,barWidth,height);
        ctx.fillStyle="#fff";
        ctx.font="12px Arial";
        ctx.fillText(entry[0], x, 265);
        ctx.fillText(entry[1]+" د.ع", x, y-5);
    });
}
</script>

</body>
</html>

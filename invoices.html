<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفواتير | دفتر الزبائن</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}
body{background:#0f172a;color:#fff;display:flex;min-height:100vh}
.sidebar{width:240px;background:#1e293b;padding:30px 20px}
.logo{text-align:center;margin-bottom:40px}
.sidebar a{display:block;padding:12px;margin-bottom:10px;color:#cbd5e1;text-decoration:none;border-radius:8px;transition:.3s;}
.sidebar a:hover,.sidebar .active{background:#3b82f6;color:#fff}
.main{flex:1;padding:30px}
.form-box{background:rgba(255,255,255,.05);padding:20px;border-radius:15px;margin-bottom:30px}
select,input{padding:10px;margin:5px;border:none;border-radius:6px}
button{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.btn-primary{background:#3b82f6;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-success{background:#22c55e;color:#fff}
table{width:100%;border-collapse:collapse;background:#1e293b;margin-top:20px;}
th,td{padding:12px;text-align:center}
th{background:#334155}
tr:nth-child(even){background:#1a2335}
.paid{background:#064e3b !important}
</style>
</head>
<body>

<div class="sidebar">
    <h2 class="logo">دفتر الزبائن</h2>
    <a href="index.html">لوحة التحكم</a>
    <a href="customers.html">الزبائن</a>
    <a href="invoices.html" class="active">الفواتير</a>
    <a href="logs.html">سجل الحركات</a>
</div>

<div class="main">
    <h1>إدارة الفواتير</h1>

    <div class="form-box">
        <select id="customerSelect">
            <option value="">اختر زبون</option>
        </select>
        <input type="number" id="invoiceAmount" placeholder="مبلغ الفاتورة">
        <input type="number" id="invoicePaid" placeholder="المبلغ المدفوع (اختياري)">
        <button class="btn-primary" onclick="addInvoice()">إضافة فاتورة</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>الزبون</th>
                <th>إجمالي</th>
                <th>مدفوع</th>
                <th>متبقي</th>
                <th>إضافة دفعة</th>
                <th>حذف</th>
            </tr>
        </thead>
        <tbody id="invoicesTable">
            <tr><td colspan="6">لا توجد بيانات</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7EVNCSl48CQgIC_a8wdC5UG2tKLtNKjQ",
  authDomain: "garag-system.firebaseapp.com",
  databaseURL: "https://garag-system-default-rtdb.firebaseio.com",
  projectId: "garag-system"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const storeId = "main_store_001"; // ثابت لكل الصفحات

function addLog(action, description){
    const now = new Date();
    set(ref(db, `stores/${storeId}/logs/${Date.now()}`),{
        action,
        description,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString(),
        timestamp: Date.now()
    });
}

// تحميل الزبائن للقائمة
onValue(ref(db, `stores/${storeId}/customers`), snapshot=>{
    const data = snapshot.val();
    const select = document.getElementById("customerSelect");
    select.innerHTML = '<option value="">اختر زبون</option>';
    if(data){
        Object.entries(data).forEach(([id,c])=>{
            select.innerHTML += `<option value="${c.name}">${c.name}</option>`;
        });
    }
});

window.addInvoice = function(){
    const customer = document.getElementById("customerSelect").value;
    const total = Number(document.getElementById("invoiceAmount").value);
    const paid = Number(document.getElementById("invoicePaid").value) || 0;

    if(!customer || !total) return alert("أكمل البيانات");

    const id = Date.now();
    const remaining = total - paid;

    set(ref(db, `stores/${storeId}/invoices/${id}`),{
        customer,
        total,
        paid,
        remaining,
        createdAt: Date.now()
    });

    addLog("إضافة فاتورة","فاتورة بقيمة "+total+" للزبون "+customer);
};

window.addPayment = function(id,total,paid,customer){
    const amount = Number(prompt("ادخل مبلغ الدفعة"));
    if(!amount) return;

    const newPaid = paid + amount;
    const newRemaining = total - newPaid;

    update(ref(db, `stores/${storeId}/invoices/${id}`),{
        paid: newPaid,
        remaining: newRemaining
    });

    addLog("إضافة دفعة","تم دفع "+amount+" للزبون "+customer);
};

window.deleteInvoice = function(id,customer){
    if(confirm("هل تريد حذف الفاتورة؟")){
        remove(ref(db, `stores/${storeId}/invoices/${id}`));
        addLog("حذف فاتورة","تم حذف فاتورة للزبون "+customer);
    }
};

// عرض الفواتير
onValue(ref(db, `stores/${storeId}/invoices`), snapshot=>{
    const data = snapshot.val();
    const table = document.getElementById("invoicesTable");
    table.innerHTML="";

    if(!data){
        table.innerHTML="<tr><td colspan='6'>لا توجد بيانات</td></tr>";
        return;
    }

    Object.entries(data).forEach(([id,inv])=>{
        table.innerHTML += `
        <tr class="${inv.remaining<=0?'paid':''}">
            <td>${inv.customer}</td>
            <td>${inv.total}</td>
            <td>${inv.paid}</td>
            <td>${inv.remaining}</td>
            <td>
                <button class="btn-success" onclick="addPayment('${id}',${inv.total},${inv.paid},'${inv.customer}')">
                دفعة
                </button>
            </td>
            <td>
                <button class="btn-danger" onclick="deleteInvoice('${id}','${inv.customer}')">
                حذف
                </button>
            </td>
        </tr>`;
    });
});
</script>
</body>
</html>
